services:
  - type: web
    name: greenkoolers-api
    runtime: node
    region: singapore
    plan: free
    rootDir: Backend
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /health/ready
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 2h
      - key: FRONTEND_URL
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: IMAP_HOST
        value: imap.gmail.com
      - key: IMAP_PORT
        value: 993
      - key: IMAP_SECURE
        value: true
      - key: IMAP_USER
        sync: false
      - key: IMAP_PASS
        sync: false
      - key: IMAP_MAILBOX
        value: INBOX
